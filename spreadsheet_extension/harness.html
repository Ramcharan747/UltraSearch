<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UltraSearch Extension Developer Harness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #070A13;
      --bg-card: rgba(15, 20, 36, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary: linear-gradient(135deg, #6366F1, #4F46E5);
      --primary-solid: #4F46E5;
      --text-main: #F9FAFB;
      --text-muted: #9CA3AF;
      --grid-bg: #0b0f19;
      --grid-border: #1e293b;
      --grid-selected: rgba(99, 102, 241, 0.15);
      --grid-selected-border: #6366f1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #EC4899, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo span {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      border: 1px solid var(--border-color);
      padding: 2px 6px;
      border-radius: 4px;
      -webkit-text-fill-color: var(--text-muted);
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    button {
      background: var(--primary);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.98);
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }

    button.secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .spreadsheet-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--grid-bg);
      border-right: 1px solid var(--border-color);
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .grid-container {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    table.sheet-grid {
      border-collapse: collapse;
      width: 100%;
      user-select: none;
    }

    th, td {
      border: 1px solid var(--grid-border);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
    }

    th {
      background: #0f172a;
      color: #94a3b8;
      font-weight: 500;
      padding: 6px 12px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th.row-num {
      position: sticky;
      left: 0;
      z-index: 3;
      width: 40px;
      text-align: center;
      background: #0f172a;
    }

    th.corner-header {
      position: sticky;
      top: 0;
      left: 0;
      z-index: 4;
      background: #1e293b;
    }

    td {
      background: #070e1b;
      color: #cbd5e1;
      height: 28px;
      padding: 0;
      vertical-align: middle;
      position: relative;
    }

    td input {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      color: inherit;
      font-family: inherit;
      font-size: inherit;
      padding: 0 8px;
      outline: none;
    }

    td input:focus {
      background: rgba(255, 255, 255, 0.03);
    }

    /* Selected cell styling */
    tr.selected-row td {
      background: var(--grid-selected);
    }
    
    td.selected-cell {
      outline: 2px solid var(--grid-selected-border);
      outline-offset: -2px;
      background: var(--grid-selected);
      z-index: 1;
    }

    /* Active processing row highlight */
    tr.processing-row td {
      background: rgba(99, 102, 241, 0.12) !important;
      outline: 1px solid rgba(99, 102, 241, 0.3);
      outline-offset: -1px;
    }
    tr.processing-row td input {
      color: #a5b4fc !important;
      font-weight: 500;
    }

    .selection-info {
      padding: 8px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid var(--border-color);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-panel {
      width: 380px;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
    }

    iframe#sidebar-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg-base);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      UltraSearch <span>Extension Harness</span>
    </div>
    <div class="controls">
      <button class="secondary" onclick="loadMockQueries()">Load Demo Queries</button>
      <button class="secondary" onclick="clearGrid()">Clear Grid</button>
      <button class="secondary" onclick="exportDataJson()">Export JSON</button>
    </div>
  </header>

  <div class="main-container">
    <!-- Left Pane: Spreadsheet Grid -->
    <div class="spreadsheet-panel">
      <div class="panel-header">
        <div class="panel-title">Mock Spreadsheet (Google Sheets / Excel Grid)</div>
        <div style="font-size: 12px; color: var(--text-muted);">Click and drag to select rows, double click cells to edit</div>
      </div>
      <div class="grid-container">
        <table class="sheet-grid" id="excel-grid">
          <!-- Dynamically generated in harness.js -->
        </table>
      </div>
      <div class="selection-info">
        <span id="selection-range-text">Selection: None</span>
        <span id="selected-count-text">Rows Selected: 0</span>
      </div>
    </div>

    <!-- Right Pane: Sidebar Frame -->
    <div class="sidebar-panel">
      <iframe id="sidebar-frame" src="sidebar.html?harness=true"></iframe>
    </div>
  </div>

  <script src="harness.js"></script>
</body>
</html>
