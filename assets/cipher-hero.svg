  <!-- Ghost Body -->
  <path d="M 25 60 C 25 15, 95 15, 95 60 V 95 L 85 85 L 75 95 L 60 85 L 45 95 L 35 85 L 25 95 Z" fill="url(#headerGhostGrad)" />
  
