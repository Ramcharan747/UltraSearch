    <linearGradient id="headerGlassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.2" />
