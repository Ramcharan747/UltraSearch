    <circle cx="84" cy="54" r="14" fill="url(#headerGlassGrad)" stroke="#94a3b8" stroke-width="4" />
    <path d="M 76 48 A 8 8 0 0 1 88 46" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8" />
